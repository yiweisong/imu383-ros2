name: Build ROS 2 Node

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        path: src/imu383

    - name: Setup ROS 2 Jazzy
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: jazzy

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ros-jazzy-rclcpp ros-jazzy-sensor-msgs ros-jazzy-serial-driver ros-jazzy-asio-cmake-module

    - name: Build with colcon
      run: |
        source /opt/ros/jazzy/setup.bash
        colcon build --packages-select imu383
